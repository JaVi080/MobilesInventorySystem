     <form id="Customer_form">
      <div class="form-grid">
        <div class="form-group">
          <label for="fName">Customer First Name:</label>
          <input type="text" id="customerName" name="fName" required>

        <div class="form-group">
          <label for="lName"> Last Name:</label>
          <input type="text" id="lName" name ="last_Name" required>

      <button id="Add_Customer" type="submit" style="padding:20px;margin-left:100px">Add Customer</button>

     <script src="../../js/helperApi.js"></script>
    <script>
      //Inserting DATA
const act_form=document.getElementById("Customer_form")?.addEventListener("submit",async (e)=>{
    e.preventDefault();
  
    // const P_model=document.getElementById("Model").value.trim(); 

    const formdata=new FormData(e.target);
    const data={};
    for(let[key,values] of formdata.entries()){
        data[key]=values.trim();
    }
    console.log(data);
    try{
    const res=await secureFetch('http://localhost:5000/api/AddCustomers',{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        // body:JSON.stringify({P_name,P_model,brand})
        body:JSON.stringify(data)
    });
    const res_data=await res.json();
    if(res_data.success){
        console.log("hello there")
        alert("Data of Customers saved");
        document.getElementById("Customer_form").reset();
    }else{
        alert("Error"+(res_data.error()||"unknown"));
        console.log("error");
    }
}catch(err){
    console.log(err.message+"Req Failed");
}
});

    </script>
