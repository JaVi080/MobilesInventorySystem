<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Customers</title>
   <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
  <header>
    <h1>Mobile Phones Inventory System</h1>
  </header>

   <nav class="sidebar">
    <h2 style="text-align:center; margin-bottom:20px;">Menu</h2>
      <a href="../../index.html">Dashboard</a>
    <a href="../phones/Phones.html">Phones</a>
    <a href="../suppliers/view.html">Suppliers</a>
    <a href="../customers/Customer.html">Customers</a>
    <a href="../employees/employe.html">Employees</a>
    <a href="../sales/sales.html">Sale</a>
    <a href="../stock.html">Stock In</a>
  </nav>

  <main>

    <!-- -------- -->
     <div id="viewCustomers" style="padding:20px;">
      <h2>View / Update Customers Info</h2>
      <div class="button-row">
        <button id="view_cust_Info">View All Customers</button>
        <div class="right-buttons">
          <button id="edit-cust-btn">Edit Info</button>
          <button id="save-cust-info">Save Info</button>
        </div>
      </div>
      <div id="drop">
        <input id="customer_id" type="text" placeholder="Search by Customer ID" />
        <input id="customer_name" type="text" placeholder="Search by Customer Name" />

         <select id="dropdown_cust_city">
          <option value="" disabled selected>By City</option>
         </select>
        <button id="search_btn">Search</button>
        <button id="reset_btn">Reset</button>
      </div>
      <table id="phonesTable">
    <thead>
      <tr>
        <th>Customer ID</th>
        <th>Customer Name</th>
        <th>City</th>
        <th>Email</th>
        <th>Phone_No</th>
        <th>Address</th>
        <th>Added Date</th>
        <th>Last Updated</th>
      </tr>
    </thead>
    <tbody id="phonesTableBody">
      <!-- Rows will be added dynamically here -->
    </tbody>
  </table>
</div>
<!-- --------------- -->
  </main>
   <script src="../../js/helperApi.js"></script>
  <script type="module" src="../../js/customers.js"></script>

</body>
</html>
