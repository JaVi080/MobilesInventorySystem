     <form id="phone_form">
      <div class="form-grid">
        <div class="form-group">
          <label for="brand">Brand:</label>
          <input type="text" id="brand" name="brand" required>
        </div>
        <div class="form-group">
          <label for="Model">Model:</label>
          <input type="text" id="Model" name ="model" required>
        </div>
         <div class="form-group">
          <label for="Model_no">Model_No:</label>
          <input type="text" id="model_no" name="model_no" required>
        </div>
            <div class="form-group">
          <label for="OS">OS:</label>
          <input type="text" id="OS" name="OS" required>
        </div>
           <div class="form-group">
          <label for="Processor">Processor:</label>
          <input type="text" id="Processor" name="Processor" required>
        </div>
        <div class="form-group">
          <label for="Storage">Storage:</label>
          <input type="text" id="Storage" name="Storage" required>
        </div>
        <div class="form-group">
          <label for="Ram">RAM:</label>
          <input type="text" id="Ram" name="Ram"  required>
        </div>
        <div class="form-group">
          <label for="Warranty">Warranty Period:</label>
          <input type="text" id="Warranty" name="Warranty" required>
        </div>
      </div>
      <button id="Add Phone" type="submit" style="padding:20px;margin-left:100px">Add Phone</button>
    </form>

     <script src="../../js/helperApi.js"></script>
    <script>
      //Inserting DATA
const act_form=document.getElementById("phone_form")?.addEventListener("submit",async (e)=>{
    e.preventDefault();
  
    // const P_model=document.getElementById("Model").value.trim(); 

    const formdata=new FormData(e.target);
    const data={};
    for(let[key,values] of formdata.entries()){
        data[key]=values.trim();
    }
    console.log(data);
    try{
    const res=await secureFetch('http://localhost:5000/api/AddPhones',{
        method:"POST",
        headers:{"Content-type":"application/json"},
        // body:JSON.stringify({P_name,P_model,brand})
        body:JSON.stringify(data)
    });
    const res_data=await res.json();
    if(res_data.success){
        console.log("hello there")
        alert("Data saved");
        document.getElementById("phone_form").reset();
    }else{
        alert("Error"+(res_data.error()||"unknown"));
        console.log("error");
    }
}catch(err){
    console.log(err.message+"Req Failed");
}
});

    </script>
