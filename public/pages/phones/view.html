<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Phones</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/phones.css">
</head>

<body>
  <header>
    <h1>Mobile Phones Inventory System</h1>
  </header>

  <nav class="sidebar">
    <h2 style="text-align:center; margin-bottom:20px;">Menu</h2>
    
    <a href="../../index.html">Dashboard</a>
    <a href="Phones.html">Phones</a>
    <a href="../suppliers/Supplier.html">Suppliers</a>
    <a href="../customers/Customer.html">Customers</a>
    <a href="../employees/employe.html">Employees</a>
    <a href="../sales.html">Sale</a>
    <a href="../stock.html">Stock In</a>
  </nav>

  <main>

    <!-- -------- -->
    <div id="viewPhones" style="padding:20px;">
      <div>
        <h2>View / Update Phones</h2>
   <div class="button-row">
  <button id="view_btn">View Phones</button>
  <div class="right-buttons">
    <button id="edit-phone-btn">Edit Info</button>
    <button id="save-phone-info">Save Info</button>
  </div>
</div>
      </div>
      <div id="drop">
        <input id="phone_id" type="text" placeholder="Search by Phone ID" />

        <select id="dropdown_brand">
          <option value="" disabled selected>Brand Selection</option>
        </select>

        <select id="dropdown_model">
          <option value="" disabled selected>Model Selection</option>
        </select>

        <select id="dropdown_modelNo">
          <option value="" disabled selected>Model Number Selection</option>
        </select>
        <button id="search_btn">Search</button>
         <button id="reset_btn">Reset</button>
      </div>


      <div id="phonesTableContainer">
        <table id="phonesTable">
          <thead>
            <tr>
              <th>Phone Id</th>
            <th>Brand</th>
            <th>Model</th>
            <th>Model No</th>
            <th>OS</th>
            <th>Processor</th>
            <th>Storage</th>
            <th>Warranty (Yrs)</th>
            <th>Base Price</th>
            <th>Total Stock</th>
            <th>2nd_Hand</th>
            <th>Date Added</th>
            <th>Last Updated</th>
          </tr>
        </thead>
        <tbody id="phonesTableBody">
          <!-- Rows will be added dynamically here -->
        </tbody>
      </table>
    </div>
  
  </main>
  <script src="../../js/helperApi.js"></script>

  <script type="module">
   
  </script>
  <script type="module" src="../../js/phones.js"></script>
</body>

</html>
