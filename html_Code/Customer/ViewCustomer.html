<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vire Customerst</title>
     <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <main>
    <!-- -------- -->
   <nav id="navbar"></nav>

     <div id="viewCustomers" style="padding:20px;margin-left:50px;">
      <div>
  <h2 >View Customers Info</h2>
    <button id="view_cust_Info">View Customers Info</button>
    </div>
  <table id="phonesTable" style="margin-left:-200px;" >
    <thead>
      <tr>
        <th>Customer ID </th>
        <th>Customer Name</th>
        <th>City</th>
        <th>Email</th>
        <th>Phone_No</th>
        <th>Address</th>
        <!-- <th>No_Of_Orders</th> -->
        <th>Added Date</th>
      <th>Last Updated </th> 
    
      </tr>
    </thead>
    <tbody id="phonesTableBody">
      <!-- Rows will be added dynamically here -->
    </tbody>
  </table>
  </main>
</div>
<script>
    // loding navbar
    fetch('navbar.html').then(res=>res.text()).then(data=>document.getElementById('navbar').innerHTML=data);
</script>
 <script >
    //View Customers 
const view_button=document.getElementById("view_cust_Info")?.addEventListener("click",async()=>{
    try{
        const res_get=await fetch('http://localhost:5000/Customers_View');
        const res_data=await res_get.json();//.json() is a method on the Response object.
           // It reads the response body and parses it as JSON.
           //Now res_data is the actual data 
           const tbody=document.getElementById("phonesTableBody");
           tbody.innerHTML="";
           console.log("hello there buddy");
           console.log(res_data);

           console.log(res_data[0]?.model);
 if(res_data.length>0){
    console.log("sUCCESS Retrieve");
 }else{
    console.log("customers view error")
 }
               // Display data
      let html = "";
    //   later on also have to add no of orders
        res_data.forEach(cust => {
          html += `<tr><td>${cust.customer_id}</td><td>${cust.fName + ' ' + cust.lName}</td>
         <td>${cust.city||''}</td>
          <td>${cust.email||''}</td>
        <td>${cust.phone_no||''}</td>
      <td>${cust.Address||''}</td>
          <td>${new Date(cust.date_added).toLocaleDateString()}</td><td>${new Date(cust.last_updated).toLocaleDateString()}</td></tr>`;
        });

        tbody.innerHTML = html;

    }catch(err){
        console.log(err);
    }
});
  </script>
</body>
</html>
