<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Suppliers</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header>
    <h1>Mobile Phones Inventory System</h1>
  </header>

   <nav class="sidebar">
    <h2 style="text-align:center; margin-bottom:20px;">Menu</h2>
    <a href="../../index.html">Dashboard</a>
    <a href="/html_Code/Phones/Phones.html">Phones</a>
    <a href="Supplier.html">Suppliers</a>
    <a href="#">Customers</a>
  </nav>

  <main>
 
    <!-- -------- -->
     <div id="viewPhones" style="padding:20px;">
      <h2>View / Update Suppliers Info</h2>
      <div class="button-row">
        <button id="view_Supp_Info">View All Suppliers</button>
        <div class="right-buttons">
          <button id="edit-supp-btn">Edit Info</button>
          <button id="save-supp-info">Save Info</button>
        </div>
      </div>
      <div id="drop">
        <input id="supplier_id" type="text" placeholder="Search by Supplier ID" />
        <input id="supplier_name" type="text" placeholder="Search by Supplier Name" />

         <select id="dropdown_brand">
          <option value="" disabled selected>By City</option>
         </select>
        <button id="search_btn">Search</button>
        <button id="reset_btn">Reset</button>
      </div>
      <table id="phonesTable">
    <thead>
      <tr>
        <th>SUPPLIER ID</th>
        <th>Supplier Name</th>
        <th>Associated Comapny</th>
        <th>Supplier Type</th>
        <th>City</th>
        <th>Country</th>
        <th>Email</th>
        <th>Phone No 1</th>
        <th>Phone No 2</th>
         <th>Address</th>
        <th>Added Date</th>
      <th>Last Updated </th> 
    
      </tr>
    </thead>
    <tbody id="phonesTableBody">
      <!-- Rows will be added dynamically here -->
    </tbody>
  </table>
</div>
<!-- --------------- -->
  </main>
  <script src="Supplier.js"></script>
 
</body>
</html>
