<head>

</head>
<body>
      <header>
    <h1>Mobile Phones Inventory System</h1>
  </header>
     <nav class="sidebar">
    <h2 style="text-align:center; margin-bottom:20px;">Menu</h2>

     <form id="Supplier_form">
      <div class="form-grid">
        <div class="form-group">
          <label for="Supplier Name">Supplier Name:</label>
          <input type="text" id="Supplier Name" name="Supplier_Name" required>
        </div>
        <div class="form-group">
          <label for="Company Name">Company Name:</label>
          <input type="text" id="Company Name" name ="Company_Name" required>
        </div>
            <div class="form-group">
          <label for="City">City:</label>
          <input type="text" id="City" name="City" required>
        </div>
           <div class="form-group">
          <label for="Country">Country:</label>
          <input type="text" id="Country" name="Country" required>
        </div>
        <div class="form-group">
          <label for="Email">Email:</label>
          <input type="text" id="Email" name="Email" >
        </div>
        <div class="form-group">
          <label for="Phone_1">Phone No 1:</label>
          <input type="text" id="Phone_1" name="Phone_1"  required>
        </div>
          <div class="form-group">
          <label for="Phone_2">Phone No 2:</label>
          <input type="text" id="Phone_2" name="Phone_2" >
        </div>

          <div class="form-group" style="display: flex;flex-direction: row; align-items: center; gap: 10px;">
          <label for="Supply_Type">Supply Type:</label>
          <select  name="Supply_Type" id="Supply_Type" style="width:200px">
            <option value="Manufacturer">Manufacturer</option>
            <option value="Distributer">Distributer</option>
            <option value="Retailer">Retailer</option>
        </select>
        
        </div>
        <div class="form-group">
          <label for="Address">Address:</label>
          <input type="text" id="Address" name="Address" required>
        </div>
      </div>
      <button id="Add_Supplier" type="submit" style="padding:20px;margin-left:100px">Add Supplier</button>
    </form>
    <script>
      //Inserting DATA
const act_form=document.getElementById("Supplier_form")?.addEventListener("submit",async (e)=>{
    e.preventDefault();
  
    // const P_model=document.getElementById("Model").value.trim(); 

    const formdata=new FormData(e.target);
    const data={};
    for(let[key,values] of formdata.entries()){
        data[key]=values.trim();
    }
    console.log(data);
    try{
    const res=await fetch('http://localhost:5000/AddSuppliers',{
        method:"POST",
        headers:{"Content-type":"application/json"},
        // body:JSON.stringify({P_name,P_model,brand})
        body:JSON.stringify(data)
    });
    const res_data=await res.json();
    if(res_data.success){
        console.log("hello there")
        alert("Data of Suppliers saved");
        document.getElementById("Supplier_form").reset();
    }else{
        alert("Error"+(res_data.error()||"unknown"));
        console.log("error");
    }
}catch(err){
    console.log(err.message+"Req Failed");
}
});

    </script>
</body>
</html>
