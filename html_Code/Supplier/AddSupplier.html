  <main>
    <form id="Supplier_form">
      <div class="form-grid">
        <div class="form-group">
          <label for="Supplier Name">Supplier Name:</label>
          <input type="text" id="Supplier Name" name="Supplier_Name" required>
        </div>
        <div class="form-group">
          <label for="Company Name">Company Name:</label>
          <input type="text" id="Company Name" name ="Company_Name" required>
        </div>
            <div class="form-group">
          <label for="City">City:</label>
          <input type="text" id="City" name="City" required>
        </div>
           <div class="form-group">
          <label for="Country">Country:</label>
          <input type="text" id="Country" name="Country" required>
        </div>
        <div class="form-group">
          <label for="Email">Email:</label>
          <input type="text" id="Email" name="Email" >
        </div>
        <div class="form-group">
          <label for="Phone_1">Phone No 1:</label>
          <input type="text" id="Phone_1" name="Phone_1"  required>
        </div>
          <div class="form-group">
          <label for="Phone_2">Phone No 2:</label>
          <input type="text" id="Phone_2" name="Phone_2" >
        </div>

          <div class="form-group">
            <label for="Supply_Type">Supply Type:</label>
            <select name="Supply_Type" id="Supply_Type">
              <option value="Manufacturer">Manufacturer</option>
              <option value="Distributer">Distributer</option>
              <option value="Retailer">Retailer</option>
            </select>
          </div>
        <div class="form-group">
          <label for="Address">Address:</label>
          <input type="text" id="Address" name="Address" required>
        </div>
      </div>
      <button id="Add_Supplier" type="submit">Add Supplier</button>
    </form>
  </main>
